version: "3.9"

# ══════════════════════════════════════════════════════════════════
# docker-compose.prod.yml — Production overrides for Nirikshak AI
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ══════════════════════════════════════════════════════════════════

services:
  postgres:
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-nirikshak}
      POSTGRES_USER:     ${POSTGRES_USER:-nirikshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}     # REQUIRED — set in .env
    ports: []      # Do NOT expose DB port in prod — internal only
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  python-ai:
    restart: always
    ports: []      # Internal only — accessed by springboot via service name
    deploy:
      replicas: 2                    # Scale AI inference horizontally
      resources:
        limits:   { cpus: "1.0", memory: "1G" }
        reservations: { memory: "512M" }
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  springboot:
    restart: always
    environment:
      JWT_SECRET:              ${JWT_SECRET}              # REQUIRED
      SPRING_DATASOURCE_URL:   ${SPRING_DATASOURCE_URL}  # REQUIRED
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-nirikshak}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      AI_VISION_SERVICE_URL:   http://python-ai:8000
      SPRING_PROFILES_ACTIVE:  prod
      JAVA_OPTS:               "-Xms256m -Xmx512m -XX:+UseG1GC"
    ports: []      # Internal only — accessed by nginx
    deploy:
      resources:
        limits:   { cpus: "1.0", memory: "768M" }
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "5" }

  frontend:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH}:/etc/nginx/ssl/nirikshak.crt:ro
      - ${SSL_KEY_PATH}:/etc/nginx/ssl/nirikshak.key:ro
    deploy:
      resources:
        limits: { cpus: "0.25", memory: "128M" }
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }
