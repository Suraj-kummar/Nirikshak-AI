# application-prod.properties
# Activated when SPRING_PROFILES_ACTIVE=prod

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.nirikshak=WARN
logging.level.org.springframework=WARN
logging.level.root=ERROR

# ── Connection pool (HikariCP) ────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.show-sql=false
# Flyway manages schema — do not let Hibernate touch DDL
spring.jpa.hibernate.ddl-auto=none
# Render PostgreSQL requires SSL
spring.datasource.hikari.data-source-properties.sslmode=require

# ── Actuator — restrict to internal probes only ───────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Disable detailed error messages in prod ───────────────────────────────────
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ── HTTP compression ──────────────────────────────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/html,text/css
server.compression.min-response-size=1024
