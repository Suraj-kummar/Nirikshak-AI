server.port=8080
spring.application.name=nirikshak-backend

# ── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nirikshak}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nirikshak}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nirikshak123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Flyway owns all schema changes; ddl-auto must NOT be 'update' in production
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ──────────────────────────────────────────────────────────────────
# baseline-on-migrate: accept existing schema (init via schema.sql) without a history table
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── HikariCP connection pool ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ── AI Vision Service ────────────────────────────────────────────────────────
ai.vision.service.url=${AI_VISION_SERVICE_URL:http://localhost:8000}
ai.vision.timeout.ms=2000

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:nirikshak_jwt_secret_change_in_prod_use_256bit}
jwt.expiration=28800000

# ── WebSocket ────────────────────────────────────────────────────────────────
spring.websocket.max-text-message-size=10485760
spring.websocket.max-binary-message-size=10485760

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.nirikshak=INFO
logging.level.org.springframework.web.socket=WARN
