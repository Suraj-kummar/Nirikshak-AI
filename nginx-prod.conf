# ══════════════════════════════════════════════════════════════
# Nirikshak AI — Production HTTPS Nginx Config
# ══════════════════════════════════════════════════════════════
# Place your SSL certs at:
#   /etc/nginx/ssl/nirikshak.crt
#   /etc/nginx/ssl/nirikshak.key
# (Use Let's Encrypt / Certbot in production)

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nirikshak.yourdomain.com;

    # ── SSL ──────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/nirikshak.crt;
    ssl_certificate_key /etc/nginx/ssl/nirikshak.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                   always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss:;"
        always;

    # ── React SPA ────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API Proxy → Spring Boot ──────────────────────────────────
    location /api/ {
        proxy_pass         http://springboot:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # ── WebSocket Proxy → Spring Boot ────────────────────────────
    # ws:// upgrades to wss:// when client connects via https
    location /ws/ {
        proxy_pass          http://springboot:8080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade      $http_upgrade;
        proxy_set_header    Connection   "Upgrade";
        proxy_set_header    Host         $host;
        proxy_set_header    X-Real-IP    $remote_addr;
        proxy_read_timeout  3600s;    # Keep WS alive for exam duration
        proxy_send_timeout  3600s;
    }
}
